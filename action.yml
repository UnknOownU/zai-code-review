name: 'Z.ai Code Review'
description: 'AI-powered code review using Z.ai API with inline comments, code suggestions, and PR summaries'
author: 'Z.ai'
inputs:
  ZAI_API_KEY:
    description: 'Z.ai API key'
    required: true
  ZAI_MODEL:
    description: 'Z.ai model to use'
    required: false
    default: 'glm-5.1'
  ZAI_SYSTEM_PROMPT:
    description: 'Custom system prompt for the AI reviewer'
    required: false
    default: ''
  ZAI_REVIEWER_NAME:
    description: 'Display name for the reviewer in comments'
    required: false
    default: 'Z.ai Code Review'
  GITHUB_TOKEN:
    description: 'GitHub token for API access'
    required: false
    default: '${{ github.token }}'
  max_files:
    description: 'Maximum number of files to analyze per PR'
    required: false
    default: '20'
  exclude_patterns:
    description: 'Comma-separated file patterns to exclude from review'
    required: false
    default: 'package-lock.json,yarn.lock,pnpm-lock.yaml,*.min.js,*.min.css,*.bundle.js,*.map'
  language:
    description: 'Language for AI review comments (e.g. en, fr, de, ja, zh, es, ar)'
    required: false
    default: 'en'
  auto_approve:
    description: 'Automatically approve PR if no issues found'
    required: false
    default: 'false'
  max_comments:
    description: 'Maximum number of inline comments to post per review'
    required: false
    default: '50'
  ai_base_url:
    description: 'Base URL for the Z.ai API'
    required: false
    default: 'https://api.z.ai'
  use_coding_plan:
    description: 'Use the GLM Coding Plan endpoint instead of the standard API'
    required: false
    default: 'true'
  enable_thinking:
    description: 'Enable chain-of-thought reasoning for deeper analysis (increases token usage)'
    required: false
    default: 'false'
  autofix_mode:
    description: 'Autofix mode: disabled (default), suggest (render suggestions), or commit (apply fixes directly to branch)'
    required: false
    default: 'disabled'
  incremental:
    description: 'Only review files changed since the last review (true/false)'
    required: false
    default: 'true'
  chat_enabled:
    description: 'Enable /zai-review chat commands in PR comments (true/false)'
    required: false
    default: 'true'
  chat_allowed_roles:
    description: 'Comma-separated GitHub roles allowed to use chat commands (OWNER, MEMBER, COLLABORATOR, etc.)'
    required: false
    default: 'OWNER,MEMBER,COLLABORATOR'

outputs:
  review_status:
    description: 'The review verdict: approve, request_changes, or comment'
  comments_count:
    description: 'Total number of inline comments posted'
  critical_count:
    description: 'Number of critical severity findings'
  security_count:
    description: 'Number of security category findings'
  warning_count:
    description: 'Number of warning severity findings'

runs:
  using: 'node20'
  main: 'dist/index.js'
branding:
  icon: 'eye'
  color: 'blue'
