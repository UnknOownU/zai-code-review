name: Z.ai Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Z.ai Code Review
        uses: UnknOownU/zai-code-review@v1
        with:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          language: fr
