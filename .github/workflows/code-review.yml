name: AI Code Review with Z.ai
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Code Review
        uses: ./
        with:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
